global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'hotresvib-monitor'

scrape_configs:
  - job_name: 'hotresvib'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:9090']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
