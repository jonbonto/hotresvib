spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotresvib}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:hotresvib_user}
    password: ${SPRING_DATASOURCE_PASSWORD:hotresvib_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for schema management
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false  # Disable OSIV to prevent lazy loading issues
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour default TTL in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true
  server:
    port: 9090

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:dev}
  enabled: ${SENTRY_ENABLED:false}

email:
  enabled: true
  async:
    enabled: true
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 100
  retry:
    max-attempts: 3
    initial-delay-ms: 1000
    max-delay-ms: 10000
    multiplier: 2.0
  sendgrid:
    api-key: ${SENDGRID_API_KEY:SG.dummy_key_for_development}
    from-email: ${EMAIL_FROM:noreply@hotresvib.com}
    from-name: ${EMAIL_FROM_NAME:HotResvib}
  smtp:
    enabled: false
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from-email: ${EMAIL_FROM:noreply@hotresvib.com}

security:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}

stripe:
  api-key-secret: ${STRIPE_API_KEY_SECRET:sk_test_dummy_key_replace_in_production}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy_secret_replace_in_production}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    # expose the UI under `/swagger-ui` so that both `/swagger-ui` and
    # `/swagger-ui/` work (the default previously was `/swagger-ui.html`).
    path: /swagger-ui
    operations-sorter: alpha
    persist-authorization: true
    doc-expansion: list
  show-actuator: false
  enable-native-json-p: true

reservation:
  payment-timeout-minutes: 30

logging:
  level:
    org.springframework.jdbc.datasource.init.ScriptUtils: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

---
# Development profile with SQL logging
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:hotresvib;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration-demo
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379
    password: ""

  cache:
    type: redis

  logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# Demo profile for local H2-based runs
spring:
  config:
    activate:
      on-profile: demo
  datasource:
    url: jdbc:h2:mem:hotresvib;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration-demo

---
# Production profile (explicit)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/hotresvib
    driver-class-name: org.postgresql.Driver
    username: hotresvib_user
    password: "hotresvib_pass"
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
